<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Perfume.kkc | Feminine Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    fontFamily: { serif: ['"Noto Serif"', 'serif'], manrope: ['Manrope', 'sans-serif'] },
                    boxShadow: { 'soft': '0 20px 40px -15px rgba(219,39,119,0.1)' }
                } 
            }
        }
    </script>
    <style>
        .tab-active { color: #db2777; border-bottom: 3px solid #db2777; font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .cart-open { transform: translateX(0) !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#fff8f9] text-[#2d2426] font-manrope antialiased overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md px-6 md:px-12 py-5 flex justify-between items-center border-b border-pink-100">
        <div class="text-2xl font-serif italic tracking-tighter text-pink-800 font-bold">Studio Perfume.kkc</div>
        <div class="flex items-center gap-4">
            <button onclick="window.toggleCart()" class="relative p-2 hover:bg-pink-50 rounded-full transition-all active:scale-90">
                <span class="material-symbols-outlined text-3xl text-pink-600">shopping_bag</span>
                <span id="cart-count" class="absolute top-0 right-0 w-5 h-5 bg-pink-500 text-white text-[10px] flex items-center justify-center rounded-full font-bold shadow-sm">0</span>
            </button>
        </div>
    </nav>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-[400px] bg-white z-[100] shadow-2xl translate-x-full flex flex-col border-l border-pink-50">
        <div class="p-6 border-b border-pink-50 flex justify-between items-center bg-pink-50/30">
            <h2 class="text-xl font-bold text-pink-900 flex items-center gap-2">
                <span class="material-symbols-outlined">local_mall</span> My Basket
            </h2>
            <button onclick="window.toggleCart()" class="material-symbols-outlined text-pink-300 hover:text-pink-600 transition-colors">close</button>
        </div>
        
        <div id="cart-items-list" class="flex-grow overflow-y-auto p-6 space-y-4 no-scrollbar bg-white">
            <div class="text-center py-20">
                <span class="material-symbols-outlined text-5xl text-pink-100">shopping_basket</span>
                <p class="text-pink-300 italic mt-2">Your basket is empty...</p>
            </div>
        </div>

        <div class="p-6 border-t border-pink-50 bg-pink-50/20">
            <div class="flex justify-between items-center mb-6">
                <span class="font-medium text-pink-800/60 uppercase text-xs tracking-widest">Total Amount</span>
                <span id="cart-total" class="text-2xl font-bold text-pink-600">0 THB</span>
            </div>
            <button class="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold hover:bg-pink-700 transition-all shadow-lg shadow-pink-200 active:scale-[0.98]">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <div id="cart-overlay" onclick="window.toggleCart()" class="fixed inset-0 bg-pink-900/10 backdrop-blur-sm z-[90] hidden"></div>

    <main class="pt-32 pb-24 px-4 md:px-10 max-w-[1400px] mx-auto">
        <header class="mb-12 text-center md:text-left">
            <h1 class="noto-serif text-5xl md:text-6xl tracking-tight mb-8 font-medium text-pink-900">MY PERFUME</h1>
            
            <div class="flex justify-center md:justify-start gap-8 border-b border-pink-100 overflow-x-auto no-scrollbar">
                <button onclick="window.loadData('female')" id="tab-female" class="tab-btn pb-4 text-[12px] tracking-[0.2em] uppercase transition-all tab-active">For Her</button>
                <button onclick="window.loadData('male')" id="tab-male" class="tab-btn pb-4 text-[12px] tracking-[0.2em] uppercase transition-all text-pink-300 font-medium">For Him</button>
            </div>
        </header>

        <div id="perfume-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-20 flex flex-col items-center opacity-30 text-pink-400">
                <span class="material-symbols-outlined text-6xl animate-spin">progress_activity</span>
                <p class="mt-4 italic">Loading essence...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKXf2dzj9cNpynopueQiInBsvyMWPjx4s",
            authDomain: "miniproject-perfume.firebaseapp.com",
            projectId: "miniproject-perfume",
            storageBucket: "miniproject-perfume.firebasestorage.app",
            messagingSenderId: "498269938351",
            appId: "1:498269938351:web:3a6918c1b56a2348e06a5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ระบบตะกร้า (Cart System) ---
        window.cart = [];

        window.toggleCart = () => {
            document.getElementById('cart-sidebar').classList.toggle('cart-open');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        };

        window.addToCart = (name, price, img) => {
            const item = { name, price: Number(price), img };
            window.cart.push(item);
            updateCartUI();
            
            // เปิดตะกร้าโชว์ทันทีเมื่อกดเพิ่ม
            document.getElementById('cart-sidebar').classList.add('cart-open');
            document.getElementById('cart-overlay').classList.remove('hidden');
        };

        window.removeFromCart = (index) => {
            window.cart.splice(index, 1);
            updateCartUI();
        };

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            
            count.innerText = window.cart.length;

            if (window.cart.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20">
                        <span class="material-symbols-outlined text-5xl text-pink-100">shopping_basket</span>
                        <p class="text-pink-300 italic mt-2">Your basket is empty...</p>
                    </div>`;
                total.innerText = '0 THB';
                return;
            }

            let sum = 0;
            list.innerHTML = window.cart.map((item, idx) => {
                sum += item.price;
                return `
                    <div class="flex items-center gap-4 bg-pink-50/40 p-3 rounded-2xl border border-pink-100 group animate-fade-in">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl shadow-sm bg-white">
                        <div class="flex-grow">
                            <h4 class="text-sm font-bold text-pink-900 line-clamp-1">${item.name}</h4>
                            <p class="text-pink-600 font-bold text-sm">${item.price.toLocaleString()} THB</p>
                        </div>
                        <button onclick="window.removeFromCart(${idx})" class="material-symbols-outlined text-pink-200 hover:text-red-500 transition-colors">delete</button>
                    </div>
                `;
            }).join('');
            total.innerText = `${sum.toLocaleString()} THB`;
        }

        // --- ส่วนจัดการข้อมูลจาก Firebase ---
        async function fetchPerfumes(gender) {
            const grid = document.getElementById('perfume-grid');
            try {
                const q = query(collection(db, "product"), where("p_gender", "==", gender));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-pink-300">No items found.</div>`;
                    return;
                }

                let html = '';
                snap.forEach((doc) => {
                    const p = doc.data();
                    // แก้ไขการส่ง Parameter เข้าฟังก์ชัน addToCart เพื่อป้องกันเครื่องหมายคำพูดที่มีผลกับ JS
                    const pName = p.p_name.replace(/'/g, "\\'"); 
                    
                    html += `
                        <div class="group bg-white rounded-[2.5rem] p-4 shadow-soft hover:shadow-2xl transition-all duration-500 border border-white hover:border-pink-100 flex flex-col h-full">
                            <div class="relative aspect-[4/5] overflow-hidden rounded-[2rem] bg-[#fffafb] mb-6">
                                <img src="${p.p_pic}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                                <div class="absolute bottom-4 left-4">
                                    <div class="bg-pink-600 text-white px-4 py-2 rounded-2xl shadow-lg font-bold">
                                        ${Number(p.p_price).toLocaleString()} <span class="text-[10px] opacity-70 ml-1">THB</span>
                                    </div>
                                </div>
                            </div>

                            <div class="px-3 flex flex-col flex-grow">
                                <h3 class="noto-serif text-2xl font-bold text-pink-950 mb-2 leading-tight">${p.p_name}</h3>
                                <p class="text-sm text-pink-800/50 mb-6 line-clamp-2">${p.p_detail || ''}</p>

                                <div class="mt-auto pt-4 border-t border-pink-50 flex justify-between items-center">
                                    <span class="text-[10px] font-bold text-pink-200 uppercase tracking-widest italic font-manrope">Signature Collection</span>
                                    <button onclick="window.addToCart('${pName}', '${p.p_price}', '${p.p_pic}')" 
                                            class="bg-pink-50 text-pink-600 p-3 rounded-2xl hover:bg-pink-600 hover:text-white transition-all active:scale-90 shadow-sm">
                                        <span class="material-symbols-outlined text-xl block">add_shopping_cart</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (err) {
                console.error("Error fetching perfumes:", err);
            }
        }

        window.loadData = (gender) => {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn pb-4 text-[12px] tracking-[0.2em] uppercase transition-all text-pink-300 font-medium";
            });
            document.getElementById(`tab-${gender}`).className = "tab-btn pb-4 text-[12px] tracking-[0.2em] uppercase transition-all tab-active";
            fetchPerfumes(gender);
        };

        // เริ่มต้นโหลดข้อมูล
        fetchPerfumes('female');

    </script>
</body>
</html>
